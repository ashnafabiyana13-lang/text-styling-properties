<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate</title>
    <style>
        div {
            width: 300px;
            height: 200px;
            background-color: blueviolet;
            border: 1px solid black;
        }
        #mydiv {
            transform: rotateX(180deg);
        }
    </style>
</head>
<body>
    <h1>Rotate</h1>
    <div>Codingal</div>
    <div id="mydiv">Codingal</div>
</body>
</html>
